services:
  db:
    image: mysql:8.0
    container_name: tikkle_mysql
    restart: always
    env_file:
      - ./.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - tikkle_db_data:/var/lib/mysql

  api:
    build: ./backend
    container_name: tikkle_api
    restart: always
    env_file:
      - ./.env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/secrets/google-vision-key.json
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./secrets/google-vision-key.json:/backend/secrets/google-vision-key.json:ro
    working_dir: /app
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app

volumes:
  tikkle_db_data: